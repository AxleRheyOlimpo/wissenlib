<!DOCTYPE html>
<html lang="en" data-mode="light" data-palette="golden">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WissenLib — NEU Library</title>
<link rel="stylesheet" href="css/styles.css"/>
<style>
  .login-card { text-align:center; max-width:360px; }
  .login-logo { width:64px;height:64px;object-fit:contain;margin:0 auto .625rem;display:block;border-radius:.75rem; }
  .login-logo-fallback {
    width:64px;height:64px;background:var(--p);border-radius:.875rem;
    display:flex;align-items:center;justify-content:center;font-size:2rem;
    margin:0 auto .625rem;
  }
  .login-clock {
    background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--radius);padding:.5rem 1rem;margin-bottom:1.25rem;
    display:flex;align-items:center;justify-content:center;gap:.875rem;
  }
  .google-icon { width:18px;height:18px;vertical-align:middle;flex-shrink:0; }
</style>
</head>
<body>

<div class="slideshow" aria-hidden="true">
  <div class="slide" style="background-image:url('https://raw.githubusercontent.com/AxleRheyOlimpo/wissenlib/main/images/img1.jpg')"></div>
  <div class="slide" style="background-image:url('https://raw.githubusercontent.com/AxleRheyOlimpo/wissenlib/main/images/img2.jpg')"></div>
  <div class="slide" style="background-image:url('https://raw.githubusercontent.com/AxleRheyOlimpo/wissenlib/main/images/img3.jpg')"></div>
  <div class="slide" style="background-image:url('https://raw.githubusercontent.com/AxleRheyOlimpo/wissenlib/main/images/img4.jpg')"></div>
  <div class="slide" style="background-image:url('https://raw.githubusercontent.com/AxleRheyOlimpo/wissenlib/main/images/img5.jpg')"></div>
  <div class="slide" style="background-image:url('https://raw.githubusercontent.com/AxleRheyOlimpo/wissenlib/main/images/img6.jpg')"></div>
  <div class="slide-overlay"></div>
</div>

<div id="themeBar" class="theme-bar"></div>
<div id="toasts"></div>

<!-- Blocked modal -->
<div id="blockedModal" style="
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:1rem;
">
  <div style="
    background:var(--surface);border:1px solid var(--border);
    border-radius:1rem;padding:2rem;max-width:380px;width:100%;
    text-align:center;box-shadow:0 24px 64px var(--shadow);
  ">
    <div style="font-size:2.5rem;margin-bottom:.75rem;">🚫</div>
    <div style="font-size:1rem;font-weight:800;color:var(--text);margin-bottom:.5rem;">Account Blocked</div>
    <div style="font-size:.875rem;color:var(--text2);margin-bottom:1.25rem;">
      Your account has been blocked. Please contact the <strong>library staff</strong> or the <strong>library administrator</strong> to resolve this.
    </div>
    <button onclick="document.getElementById('blockedModal').style.display='none'" class="btn btn-ghost btn-full">Close</button>
  </div>
</div>

<div class="auth-page">
  <div class="auth-card login-card" id="loginCard">

    <!-- Logo -->
    <img src="images/logo.png" class="login-logo" alt="NEU Logo"
      onerror="this.style.display='none';document.getElementById('logoFb').style.display='flex'"/>
    <div class="login-logo-fallback" id="logoFb" style="display:none;">📚</div>

    <div style="font-size:1.5rem;font-weight:800;letter-spacing:-.025em;color:var(--text);margin-bottom:.15rem;">WissenLib</div>
    <div style="font-size:.775rem;color:var(--muted);margin-bottom:1rem;">NEU Library Visitor Log System</div>

    <!-- Clock -->
    <div class="login-clock">
      <div id="loginTime" style="font-size:1.1rem;font-weight:800;color:var(--p);font-variant-numeric:tabular-nums;line-height:1;"></div>
      <span style="color:var(--border);">|</span>
      <div id="loginDate" style="font-size:.75rem;font-weight:600;color:var(--text2);"></div>
    </div>

    <!-- Google Sign In -->
    <button class="btn btn-google btn-full" onclick="doGoogleLogin()" id="btnGoogle" style="padding:.9rem;font-size:.875rem;gap:.625rem;">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <div style="font-size:.71rem;color:var(--muted);margin-top:.5rem;">NEU institutional accounts only (@neu.edu.ph)</div>

    <!-- RFID divider -->
    <div style="display:flex;align-items:center;gap:.75rem;margin:.625rem 0 .5rem;color:var(--muted);font-size:.72rem;">
      <span style="flex:1;height:1px;background:var(--border);"></span>
      or tap your ID card
      <span style="flex:1;height:1px;background:var(--border);"></span>
    </div>

    <!-- RFID status indicator -->
    <div id="rfidStatus" style="
      font-size:.78rem;color:var(--muted);
      display:flex;align-items:center;justify-content:center;gap:.4rem;
      padding:.5rem; border-radius:var(--radius-sm);
      background:var(--surface2); border:1px solid var(--border);
    ">
      <span id="rfidDot" style="width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0;"></span>
      <span id="rfidLabel">Ready — tap your ID card anytime</span>
    </div>

    <!-- Hidden RFID capture input — always focused -->
    <input id="rfidCapture" type="text" autocomplete="off"
      style="position:fixed;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px;"
      aria-hidden="true"/>

    <div id="loginErr" style="font-size:.8rem;color:var(--err);margin-top:.75rem;display:none;padding:.625rem;background:var(--surface2);border-radius:var(--radius-sm);"></div>

  </div>
</div>

<script type="module">
import { initTheme, buildThemeBar } from './js/theme.js';
import { auth, db } from './js/firebase-config.js';
import { loginWithGoogle, getUserData, getUserRole, onAuthChange, logout } from './js/auth.js';
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const { mode, palette } = initTheme();
buildThemeBar(mode, palette);

// Clock
function tick() {
  const now = new Date();
  const d = document.getElementById('loginDate');
  const t = document.getElementById('loginTime');
  if (d) d.textContent = now.toLocaleDateString('en-PH',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  if (t) t.textContent = now.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
}
tick(); setInterval(tick, 1000);

// Auto-redirect if already signed in
onAuthStateChanged(auth, async user => {
  if (!user) return;
  try {
    const data = await getUserData(user.uid);
    if (!data) {
      window.location.href = 'register.html';
      return;
    }
    const role = await getUserRole(user.uid);
    if (role === 'admin') {
      showAdminChoice(user);
    } else {
      window.location.href = 'checkin.html';
    }
  } catch(e) {
    await logout();
    if (e.message.toLowerCase().includes('blocked')) {
      showBlockedModal();
    }
  }
});

function gSvg() {
  return `<svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>`;
}

function showAdminChoice(user) {
  const card = document.getElementById('loginCard');
  const name = (user.displayName || user.email).split(' ')[0];
  card.innerHTML = `
    <img src="images/logo.png" class="login-logo" alt="NEU Logo" onerror="this.style.display='none'"/>
    <div style="font-size:1.5rem;font-weight:800;letter-spacing:-.025em;color:var(--text);margin-bottom:.2rem;">WissenLib</div>
    <div style="margin:1.25rem 0 1.5rem;">
      <div style="font-size:1rem;font-weight:800;color:var(--text);margin-bottom:.25rem;">Welcome back, ${name}!</div>
      <div style="font-size:.825rem;color:var(--muted);">Where would you like to go?</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <button onclick="window.location.href='admin.html'" class="btn btn-primary btn-full" style="padding:1rem;">Admin Dashboard</button>
      <button onclick="window.location.href='checkin.html?mode=visitor'" class="btn btn-ghost btn-full" style="padding:1rem;">Check In as Visitor</button>
      <button onclick="doAdminLogout()" style="padding:.5rem;background:none;border:none;cursor:pointer;font-size:.78rem;color:var(--muted);text-decoration:underline;margin-top:.25rem;">Sign out</button>
    </div>`;
}

function showBlockedModal() {
  document.getElementById('blockedModal').style.display = 'flex';
}

window.doAdminLogout = async () => { await logout(); window.location.href = 'index.html'; };

// ── RFID Passive Listener ─────────────────────────────────
const rfidCapture = document.getElementById('rfidCapture');
const rfidLabel   = document.getElementById('rfidLabel');
const rfidDot     = document.getElementById('rfidDot');

// Keep the hidden input focused at all times so card tap goes straight to it
function keepRfidFocus() {
  // Only refocus if no other input/button is actively being used
  if (document.activeElement === document.body ||
      document.activeElement === null ||
      document.activeElement === rfidCapture) {
    rfidCapture.focus();
  }
}
setInterval(keepRfidFocus, 300);
document.addEventListener('click', e => {
  // After any click that isn't on a button/input, restore focus
  if (!['INPUT','BUTTON','TEXTAREA','SELECT'].includes(e.target.tagName)) {
    setTimeout(() => rfidCapture.focus(), 100);
  }
});

rfidCapture.addEventListener('keydown', async (e) => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const cardId = rfidCapture.value.trim();
  rfidCapture.value = '';
  if (!cardId) return;

  // Show scanning state
  rfidDot.style.background = 'var(--warn)';
  rfidLabel.textContent = 'Scanning…';

  try {
    // Look up user by studentId in Firestore
    const q    = query(collection(db, 'users'), where('studentId', '==', cardId));
    const snap = await getDocs(q);

    if (snap.empty) {
      rfidDot.style.background = 'var(--err)';
      rfidLabel.textContent = 'ID not found — please register first';
      setTimeout(() => {
        rfidDot.style.background = 'var(--ok)';
        rfidLabel.textContent = 'Ready — tap your ID card anytime';
      }, 3000);
      return;
    }

    const userData = snap.docs[0].data();
    if (userData.blocked) {
      rfidDot.style.background = 'var(--err)';
      rfidLabel.textContent = 'Account blocked — contact library staff';
      showBlockedModal();
      setTimeout(() => {
        rfidDot.style.background = 'var(--ok)';
        rfidLabel.textContent = 'Ready — tap your ID card anytime';
      }, 4000);
      return;
    }

    // Found — trigger Google sign-in with login_hint
    rfidDot.style.background = 'var(--ok)';
    rfidLabel.textContent = `Found: ${userData.displayName || userData.firstName} — opening Google…`;

    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({
      hd:          'neu.edu.ph',
      login_hint:  userData.email,
      prompt:      'select_account'
    });
    await signInWithPopup(auth, provider);
    // onAuthStateChanged handles the rest

  } catch(err) {
    rfidDot.style.background = 'var(--err)';
    rfidLabel.textContent = 'Error: ' + err.message;
    setTimeout(() => {
      rfidDot.style.background = 'var(--ok)';
      rfidLabel.textContent = 'Ready — tap your ID card anytime';
    }, 3000);
  }
});

window.doGoogleLogin = async () => {
  const btn = document.getElementById('btnGoogle');
  const err = document.getElementById('loginErr');
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Signing in…';
  err.style.display = 'none';
  try {
    await loginWithGoogle();
    // onAuthStateChanged handles redirect
  } catch(e) {
    if (e.message === 'NO_ACCOUNT') {
      window.location.href = 'register.html';
    } else {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = gSvg() + ' Continue with Google';
    }
  }
};
</script>
</body>
</html>
