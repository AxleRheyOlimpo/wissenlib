<!DOCTYPE html>
<html lang="en" data-mode="light" data-palette="golden">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WissenLib — Complete Your Profile</title>
<link rel="stylesheet" href="css/styles.css"/>
<style>
  body { background:var(--bg); min-height:100vh; }
  .reg-header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:.875rem 1.5rem; display:flex; align-items:center;
    justify-content:space-between; box-shadow:0 1px 4px var(--shadow);
  }
  .reg-body { max-width:480px; margin:2rem auto; padding:0 1rem 3rem; }
  .reg-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:1.25rem; padding:2rem;
    box-shadow:0 4px 24px var(--shadow);
  }
  .google-badge {
    display:flex; align-items:center; gap:.75rem;
    background:var(--p-10); border:1px solid var(--p-20);
    border-radius:var(--radius); padding:.875rem 1rem; margin-bottom:1.25rem;
  }
  .google-avatar {
    width:40px; height:40px; border-radius:50%;
    background:var(--p); color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:1rem; font-weight:700; flex-shrink:0;
  }
  .err-msg { font-size:.775rem; color:var(--err); margin-top:.3rem; display:none; }
  .err-msg.show { display:block; }
</style>
</head>
<body>

<div id="toasts"></div>

<!-- Header -->
<div class="reg-header">
  <div style="display:flex;align-items:center;gap:.75rem;">
    <img src="images/logo.png" style="width:34px;height:34px;object-fit:contain;border-radius:.5rem;"
      alt="Logo" onerror="this.style.display='none'"/>
    <div>
      <div style="font-size:.9375rem;font-weight:800;letter-spacing:-.02em;">WissenLib</div>
      <div style="font-size:.725rem;color:var(--muted);">NEU Library</div>
    </div>
  </div>
  <button onclick="doLogout()" class="btn btn-ghost btn-sm" style="color:var(--err);border-color:var(--err);">Sign Out</button>
</div>

<!-- Form -->
<div class="reg-body">
  <div class="reg-card">

    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:1.15rem;font-weight:800;color:var(--text);margin-bottom:.3rem;">Complete Your Profile</div>
      <div style="font-size:.825rem;color:var(--muted);">Just a few more details to access the library system.</div>
    </div>

    <!-- Google account info -->
    <div class="google-badge" id="googleBadge">
      <div class="google-avatar" id="gAvatar">?</div>
      <div style="min-width:0;">
        <div id="gName" style="font-weight:700;font-size:.875rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        <div id="gEmail" style="font-size:.775rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
      </div>
    </div>

    <!-- Student ID -->
    <div class="field">
      <label for="rStudentId">Student ID <span style="color:var(--muted);font-weight:400;">(format: yy-xxxxx-xxx)</span></label>
      <input class="inp" id="rStudentId" type="text" placeholder="24-12345-678"
        oninput="fmtStudentId(this)" maxlength="13"/>
      <div class="err-msg" id="errStudentId">Invalid format. Use yy-xxxxx-xxx (e.g. 24-12345-678)</div>
    </div>

    <!-- Faculty toggle -->
    <label class="check-row" style="margin-bottom:1rem;">
      <input type="checkbox" id="rIsEmployee" onchange="toggleEmployeeMode(this.checked)"/>
      <span>I am faculty / staff (not a student)</span>
    </label>

    <!-- College -->
    <div class="field">
      <label for="rDept">College / Department</label>
      <select class="inp" id="rDept" onchange="fillPrograms(this.value)">
        <option value="">— Select College —</option>
      </select>
    </div>

    <!-- Program -->
    <div class="field">
      <label for="rProg">Program / Course</label>
      <select class="inp" id="rProg">
        <option value="">— Select Program —</option>
      </select>
    </div>

    <div id="regErr" style="font-size:.8rem;color:var(--err);background:var(--surface2);border-radius:var(--radius-sm);padding:.625rem .875rem;margin-bottom:.875rem;display:none;"></div>

    <button class="btn btn-primary btn-full" id="btnRegister" onclick="doRegister()" style="padding:1rem;font-size:.9rem;">
      Complete Registration
    </button>

  </div>
</div>

<script type="module">
import { initTheme, buildThemeBar } from './js/theme.js';
import { auth } from './js/firebase-config.js';
import { createUserDocOnly, getUserRole, getUserData, logout, onAuthChange } from './js/auth.js';
import { DEPARTMENTS } from './js/firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

initTheme();

// Populate colleges
const deptSel = document.getElementById('rDept');
Object.keys(DEPARTMENTS).forEach(d => {
  const opt = document.createElement('option');
  opt.value = d; opt.textContent = d;
  deptSel.appendChild(opt);
});

window.fillPrograms = (dept) => {
  const sel = document.getElementById('rProg');
  sel.innerHTML = '<option value="">— Select Program —</option>';
  (DEPARTMENTS[dept] || []).forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
};

window.toggleEmployeeMode = (on) => {
  const idField = document.getElementById('rStudentId');
  idField.disabled = on;
  if (on) {
    idField.value = '';
    deptSel.value = 'ADMIN / Staff';
    window.fillPrograms('ADMIN / Staff');
  } else {
    idField.disabled = false;
    deptSel.value = '';
    document.getElementById('rProg').innerHTML = '<option value="">— Select Program —</option>';
  }
};

// Auth check — must be signed in but have no Firestore doc
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'index.html'; return; }

  // Show Google account info
  const name = user.displayName || user.email;
  const initials = name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('gAvatar').textContent = initials;
  document.getElementById('gName').textContent   = user.displayName || '';
  document.getElementById('gEmail').textContent  = user.email || '';

  // If already has a profile, redirect
  const data = await getUserData(user.uid);
  if (data) {
    const role = await getUserRole(user.uid);
    window.location.href = role === 'admin' ? 'admin.html' : 'checkin.html';
  }
});

window.doRegister = async () => {
  const user = auth.currentUser;
  if (!user) { window.location.href = 'index.html'; return; }

  const errEl = document.getElementById('regErr');
  errEl.style.display = 'none';
  document.getElementById('errStudentId').classList.remove('show');

  const sid   = document.getElementById('rStudentId').value.trim();
  const dept  = document.getElementById('rDept').value;
  const prog  = document.getElementById('rProg').value;
  const isEmp = document.getElementById('rIsEmployee').checked;

  if (!isEmp && sid && !/^\d{2}-\d{5}-\d{3}$/.test(sid)) {
    document.getElementById('errStudentId').classList.add('show'); return;
  }
  if (!dept || !prog) {
    errEl.textContent = 'Please select your college and program.';
    errEl.style.display = 'block'; return;
  }

  const btn = document.getElementById('btnRegister');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';

  try {
    await createUserDocOnly(user.uid, {
      email:       user.email,
      displayName: user.displayName || '',
      studentId:   sid,
      department:  dept,
      program:     prog,
      isEmployee:  isEmp
    });
    const role = await getUserRole(user.uid);
    window.location.href = role === 'admin' ? 'admin.html' : 'checkin.html';
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Complete Registration';
  }
};

window.fmtStudentId = (inp) => {
  let v = inp.value.replace(/\D/g,'');
  if (v.length > 2) v = v.slice(0,2) + '-' + v.slice(2);
  if (v.length > 8) v = v.slice(0,8) + '-' + v.slice(8);
  inp.value = v.slice(0,13);
  document.getElementById('errStudentId').classList.toggle('show',
    v.replace(/-/g,'').length === 10 && !/^\d{2}-\d{5}-\d{3}$/.test(v)
  );
};

window.doLogout = async () => { await logout(); window.location.href = 'index.html'; };
</script>
</body>
</html>
